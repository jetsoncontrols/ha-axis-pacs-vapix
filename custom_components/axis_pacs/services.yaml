# Access-code (PIN/card) management services.
# Credentials are cluster-wide on Axis controllers: config_entry_id only selects
# which controller to route the request through, not which doors are affected.

add_pin:
  fields:
    config_entry_id:
      required: true
      selector:
        config_entry:
          integration: axis_pacs
    name:
      required: true
      example: "Doe, Jane"
      selector:
        text:
    pin:
      required: true
      example: "1234"
      selector:
        text:
    access_profile_tokens:
      example: "Axis-accc8e65809e:1527885704.522608000"
      selector:
        text:
          multiple: true
    enabled:
      default: true
      selector:
        boolean:

add_credential:
  fields:
    config_entry_id:
      required: true
      selector:
        config_entry:
          integration: axis_pacs
    name:
      required: true
      example: "Doe, Jane"
      selector:
        text:
    kind:
      required: true
      selector:
        select:
          options:
            - label: PIN
              value: pin
            - label: Card
              value: card
    code:
      required: true
      example: "1234"
      selector:
        text:
    access_profile_tokens:
      example: "Axis-accc8e65809e:1527885704.522608000"
      selector:
        text:
          multiple: true
    enabled:
      default: true
      selector:
        boolean:
    valid_from:
      example: "2026-08-10"
      selector:
        date:
    valid_to:
      example: "2026-08-14"
      selector:
        date:
    expire_action:
      default: disable
      selector:
        select:
          options:
            - label: Disable when expired
              value: disable
            - label: Delete when expired
              value: delete

generate_code:
  fields:
    config_entry_id:
      required: true
      selector:
        config_entry:
          integration: axis_pacs
    kind:
      required: true
      selector:
        select:
          options:
            - label: PIN
              value: pin
            - label: Card
              value: card
    length:
      example: 5
      selector:
        number:
          min: 1
          max: 32
          mode: box

remove_credential:
  fields:
    config_entry_id:
      required: true
      selector:
        config_entry:
          integration: axis_pacs
    credential_token:
      required: true
      selector:
        text:

set_credential_enabled:
  fields:
    config_entry_id:
